<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holi Swipe Fix</title>
<style>
html, body{
  margin:0; padding:0; width:100%; height:100%; overflow:hidden;
  font-family: 'Segoe UI', sans-serif;
}
.frame{
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; justify-content:center; align-items:center;
  text-align:center; font-size:2em; color:black;
  opacity:0; transition: opacity 0.8s;
  z-index:0;
}
.frame.active{ opacity:1; z-index:1; }

.frame-bg{
  position:absolute; top:0; left:0; width:100%; height:100%;
  background: url('https://i.ibb.co/NgbKVP9x/Screenshot-20260224-172213-Instagram.jpg') center/cover no-repeat;
  z-index:0;
  filter: brightness(0.75); /* subtle fade for text readability */
}

.frame-content{
  position:relative; z-index:1;
}
</style>
</head>
<body>

<div id="frame1" class="frame">
  <div class="frame-bg"></div>
  <div class="frame-content">Frame 1: sorry for disturbing</div>
</div>
<div id="frame2" class="frame">
  <div class="frame-bg"></div>
  <div class="frame-content">Frame 2: rnggg 👆🏻kachindi</div>
</div>
<div id="frame3" class="frame">
  <div class="frame-bg"></div>
  <div class="frame-content">
    Frame 3: Happy Holi, Nazia 🌸<br>
    <span style="font-size:0.9em; font-style:italic;">khair........</span>
  </div>
</div>
<div id="frame4" class="frame">
  <div class="frame-bg"></div>
  <div class="frame-content">Frame 4: happy Holi Nazia 🫂</div>
</div>

<script>
const frames = [document.getElementById('frame1'),
                document.getElementById('frame2'),
                document.getElementById('frame3'),
                document.getElementById('frame4')];
let currentFrame = 0;
let touchStartX = 0;

function showFrame(index){
  frames.forEach(f => f.classList.remove('active'));
  frames[index].classList.add('active');
}

// Swipe detection
document.body.addEventListener('touchstart', e=>{
  touchStartX = e.changedTouches[0].clientX;
});
document.body.addEventListener('touchend', e=>{
  let touchEndX = e.changedTouches[0].clientX;
  if(touchEndX < touchStartX - 50 && currentFrame < frames.length-1){
    currentFrame++;
    showFrame(currentFrame);
  } else if(touchEndX > touchStartX + 50 && currentFrame > 0){
    currentFrame--;
    showFrame(currentFrame);
  }
});

// Initialize first frame visible
showFrame(0);
</script>

</body>
</html>
